<form onsubmit="navigateTo('/pages/list?' + $(this).serialize()); return false;">
<div style="float: left; padding-bottom: .5em" class="ev_button_medium ev_button_normal">
    <span>{{ "Search"|t(locale) }}:</span>
    <input type="text" id="quick-search" name="keywords"
           style="font-size: .8em; padding: 2px; width: 150px" />
</div>
</form>

<div style="float: right;" class="ev_padbottom">
    <div style="cursor: default; float: left" class="ev_button_medium ev_button_normal">
        <a class="ev_button_link" href="javascript:navigateTo('/pages/calendars')">{{ "Calendars"|t(locale) }}:</a>
        {% for cal in page.calendars() %}
        <a style="vertical-align: middle"
           href="javascript:toggleCalendar('{{ cal.id }}')">
            <span id="calendar_enabled_{{ cal.id }}"
                  data-name="{{ cal.name }}"
                  title="{{ cal.name }}"
                  class="ev_cal_src ev_cal_src_button
                         {% if cal.enabled %}
                         ev_cal_src_{{ cal.id }}
                         {% else %}
                         ev_cal_src_disabled
                         {% endif %}
                        ">
                <i id="ev_cal_src_button_{{ cal.id }}"
                   {% if cal.sync_error %}
                   style="display: inline"
                   {% else %}
                   style="display: none"
                   {% endif %}
                   class="bi bi-exclamation-triangle-fill"></i>
            </span>
        </a>
        <script type="text/javascript">
            $(function() {
                {% if !cal.enabled %}
                $("#calendar_enabled_{{ cal.id }}").hover(function() {
                    $(this).toggleClass("ev_cal_src_{{ cal.id }} ev_cal_src_highlight");
                });
                {% else %}
                $("#calendar_enabled_{{ cal.id }}").hover(function() {
                    $(this).toggleClass("ev_cal_src_highlight");
                });
                {% endif %}
            });
        </script>
        {% endfor %}
    </div>
    &nbsp;
    <a id="link-monthly" class="ev_button_medium ev_button_normal"
                      href="javascript:navigateTo('/pages/monthly')">
        <i class="bi bi-calendar2-month"></i>
        <span>{{ "Month"|t(locale) }}</span>
    </a>
    <a id="link-weekly" class="ev_button_medium ev_button_normal"
                      href="javascript:navigateTo('/pages/weekly')">
        <i class="bi bi-calendar2-week"></i>
        <span>{{ "Week"|t(locale) }}</span>
    </a>
    <a id="link-list" class="ev_button_medium ev_button_normal"
                      style="padding-left: 1em; padding-right: 1em"
                      href="javascript:navigateTo('/pages/list')">
        <i class="bi bi-card-list"></i>
        <span>{{ "List"|t(locale) }}</span>
    </a>
    <a id="link-help" class="ev_button_medium ev_button_normal"
                      style="padding-left: 1em; padding-right: 1em"
                      href="javascript:fireEvent(createHelpEvent())">
        <i class="bi bi-question-circle"></i>
        <span>{{ "Help"|t(locale) }}</span>
    </a>
    <a id="link-refresh" class="ev_button_medium ev_button_normal"
                         href="javascript:syncAll('last-update', 'sync-spinner', 'out-of-sync', true)">
        <i id="sync-spinner" class="bi bi-arrow-clockwise"></i>
        <span id="last-update">
            {{ &page.last_reload(locale)|time(locale, TimeFlags::None) }}
        </span>
        <i id="out-of-sync" style="color: transparent" class="bi bi-exclamation-circle-fill"></i>
    </a>
</div>
<br style="clear: both;" />
