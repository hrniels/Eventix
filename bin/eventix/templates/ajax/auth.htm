<div>
    <style>
        h1.title {
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        .container {
            margin: 1em;
            text-align: center;
        }
    </style>
    <script type="text/javascript">
        function submitAndClose() {
            const auth_url = $("#result_url").val();
            const op_url = "{{ op_url|safe }}";
            let url =
                op_url +
                (op_url.includes("?") ? "&" : "?") +
                "auth_url=" +
                encodeURIComponent(auth_url);
            fireEvent(new DeselectEvent());
            postWithSpinner("{{ spinner_id }}", url, function (data, auth_failed) {
                if (data.changed) reloadContent();
            });
        }
    </script>

    <h1 class="title">{{ "Authentication Failed"|t(locale) }}</h1>

    <div class="container">
        <p>{{ error }}</p>
        <p>
            <a href="{{ url }}">{{ "Authenticate"|t(locale) }}</a>
        </p>

        {{ "info.paste_url_and_retry"|t(locale) }}
        <br />
        <input type="text" id="result_url" name="result_url" size="50" />
        <input type="submit" value="{{ "Retry"|t(locale) }}" onclick="submitAndClose()" />
        <input
            type="button"
            value="{{ "Cancel"|t(locale) }}"
            onclick="fireEvent(new DeselectEvent())"
        />
    </div>
</div>
