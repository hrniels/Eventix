{% extends "content.htm" %}

{% block inner %}

<div>
    <form method="post" action="/edit/update">
    <input type="hidden" name="uid" value="{{ uid }}" />
    {% if let Some(rid) = rid %}
    <input type="hidden" name="rid" value="{{ rid }}" />
    {% endif %}
    <div class="ev_border">
        <h1 class="ev_topic">{{ "Edit"|t(locale) }}</h1>
        <fieldset class="ev_form">
           <dl>
                <dt>{{ "Summary"|t(locale) }}:</dt>
                <dd><input type="text" size="50" name="summary" value="{{ summary }}" /></dd>
           </dl>
           <dl>
                <dt>{{ "Date"|t(locale) }}:</dt>
                <dd>{{ start_end|safe }}</dd>
           </dl>
           <dl>
                <dt>{{ "Location"|t(locale) }}:</dt>
                <dd><input type="text" size="50" name="location" value="{{ location }}" /></dd>
           </dl>
           <dl>
                <dt>{{ "Description"|t(locale) }}:</dt>
                <dd>
                    <textarea rows="10" style="width: 90%;" name="description">{{ description }}</textarea>
                </dd>
           </dl>
           <div class="ev_submit">
                <input type="submit" value="{{ "Save"|t(locale) }}" />
                <input type="button" onclick="document.location.href = '/'" value="{{ "Cancel"|t(locale) }}" />
           </div>
        </fieldset>
    </div>
    </form>
</div>

{% endblock inner %}
