{% extends "content.htm" %}

{% block inner %}

<script type="text/javascript">
    setFormPage(true);
</script>

{% if let Some(prev) = prev %}
<form id="form" method="post" action="/pages/collections/edit?col_id={{ col_id }}&prev={{ prev }}">
{% else %}
<form id="form" method="post" action="/pages/collections/edit?col_id={{ col_id }}">
{% endif %}
    <div class="ev_border">
        <fieldset class="ev_form">
            <h1 id="title" class="ev_header">{{ "Edit Collection"|t(locale) }}</h1>
            <dl>
                <dt>{{ "Name"|t(locale) }}:</dt>
                <dd>{{ col_id }}</dd>
            </dl>
            <dl>
                <dt>{{ "Syncer"|t(locale) }}:</dt>
                <dd>{{ syncer|safe }}</dd>
            </dl>
            <div class="ev_submit">
                <a class="ev_button_big ev_button_normal" style="width: 80px"
                   href="javascript:$('#form').submit()">
                    <span>{{ "Save"|t(locale) }}</span>
                </a>
                <a class="ev_button_big ev_button_normal" style="width: 80px"
                   {% if let Some(prev) = prev %}
                   href="javascript:document.location.href = '{{ prev }}'"
                   {% else %}
                   href="javascript:document.location.href = '/'"
                   {% endif %}
                >
                    <span>{{ "Back"|t(locale) }}</span>
                </a>
            </div>
        </fieldset>
    </div>
</form>

<script>
    $(function() {
        $('#name').focus();
    });

    $(document).keydown(function(e) {
        if(e.ctrlKey && e.code == "Enter") {
            $('#form').submit();
            return false;
        }
        return true;
    });
</script>

{% endblock inner %}
