{% extends "content.htm" %}

{% block inner %}

<div id="edit-content">
    <p>{{ "Loading..."|t(locale) }}</p>
</div>

<script type="text/javascript">
    // Seed initial history state so popstate works on first back-navigation.
    history.replaceState({ query: '{{ request_query|safe }}' }, '', window.location.href);

    // Load the form content on page load.
    $(function() {
        fetchContentWithQuery('collections/edit', '#edit-content', '{{ request_query|safe }}', null);
    });

    // Restore content on browser back/forward navigation.
    window.addEventListener('popstate', function(e) {
        const queryStr = (e.state && e.state.query) ? e.state.query : '';
        fetchContentWithQuery('collections/edit', '#edit-content', queryStr, null);
    });
</script>

{% endblock inner %}
