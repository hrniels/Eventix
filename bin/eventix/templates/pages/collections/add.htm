{% include "messages.htm" %}
<form
    id="add-form"
    method="post"
    {% if let Some(prev) = prev %}
        action="/pages/collections/add?prev={{ prev }}"
    {% else %}
        action="/pages/collections/add"
    {% endif %}
>
    <div class="ev_border">
        <fieldset class="ev_form">
            <h1 id="title" class="ev_header">{{ "New Collection"|t(locale) }}</h1>
            <dl>
                <dt>{{ "Name"|t(locale) }}:</dt>
                <dd>
                    <input type="text" size="15" id="name" name="name" value="{{ name }}" />
                    <div>{{ "info.collection_name"|t(locale) }}</div>
                </dd>
            </dl>
            <dl>
                <dt>{{ "Syncer"|t(locale) }}:</dt>
                <dd>{{ syncer|safe }}</dd>
            </dl>
            <div class="ev_submit">
                <a
                    class="ev_button_big ev_button_normal"
                    style="width: 80px"
                    href="javascript:submitAddForm()"
                >
                    <span>{{ "Save"|t(locale) }}</span>
                </a>
                <a
                    class="ev_button_big ev_button_normal"
                    style="width: 80px"
                    {% if let Some(prev) = prev %}
                        href="javascript:navigateTo('{{ prev }}')"
                    {% else %}
                        href="javascript:navigateTo('/')"
                    {% endif %}
                >
                    <span>{{ "Back"|t(locale) }}</span>
                </a>
            </div>
        </fieldset>
    </div>
</form>

<script>
    // Submits the add form via AJAX and injects the response fragment into #page-content.
    function submitAddForm() {
        formRequest("add-form", replaceContent);
    }

    $(function () {
        $("#name").focus();
    });

    bindContentHandler("page-content", document, "keydown", function (e) {
        if (e.ctrlKey && e.code == "Enter") {
            submitAddForm();
            return false;
        }
        return true;
    });
</script>
