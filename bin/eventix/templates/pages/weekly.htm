{% extends "content.htm" %}

{% block inner %}

<div id="weekly-content">
    <p>{{ "Loading..."|t(locale) }}</p>
</div>

<script type="text/javascript">
    // Interval handle for the "now" line ticker; cleared and restarted on each fragment load
    // so there is never more than one active interval.
    let _weeklyNowInterval = null;

    function _weeklyOnLoaded() {
        if (_weeklyNowInterval !== null) clearInterval(_weeklyNowInterval);
        window.setNowLine();
        _weeklyNowInterval = setInterval(window.setNowLine, 60 * 1000);
        const area = document.getElementById('week_scroll_area');
        if (area) area.scrollTop = 60 * 8;
    }

    // Loads the weekly calendar grid for `dateStr` via AJAX and injects it into
    // #weekly-content. Also updates the browser history so the URL stays accurate.
    window.loadWeeklyContent = function(dateStr) {
        loadPageContent('weekly', '#weekly-content', dateStr, _weeklyOnLoaded);
    };

    // Restore content on browser back/forward navigation.
    window.addEventListener('popstate', function(e) {
        const dateStr = (e.state && e.state.date) ? e.state.date : '';
        fetchContent('weekly', '#weekly-content', dateStr, _weeklyOnLoaded);
    });

    // Seed initial history state so popstate works on first back-navigation.
    history.replaceState({ date: '{{ date }}' }, '', window.location.href);

    // Load the calendar grid for the current week on page load.
    $(function() {
        fetchContent('weekly', '#weekly-content', '{{ date }}', _weeklyOnLoaded);
    });
</script>

{% endblock inner %}
