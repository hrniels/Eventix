<input id="{{ id }}" type="text" name="{{ name }}" size="8"
       maxlength="5" value="{{ value|naive_time }}" />

<script type="text/javascript">
    function getClockTime(el) {
        const value = $(el).prop('value').split(':');
        const hours = + value[0] || 0;
        const mins = + value[1] || 0;
        return [hours, mins];
    }

    function adjustTime(val, limit, inc, up) {
        if(up)
            val = (val + inc) % limit;
        else if(val == 0)
            val = limit - inc;
        else
            val -= inc;
        return val;
    }

    function setClockTime(el, pair) {
        const hours = pair[0].toString().padStart(2, '0');
        const mins = pair[1].toString().padStart(2, '0');
        updateClockTime(el, hours + ':' + mins);
    }

    function updateClockTime(el, value) {
        $(el).prop('value', value);
        $(el).clockpicker('hide');
        $(el).clockpicker('show');
    }

    $(function() {
        const options = {
            autoclose: true,
        };
        let el = $('#{{ id }}');
        el.clockpicker(options);
        el.on('input', function() {
            updateClockTime(this, $(this).prop('value'));
            return false;
        });
        el.keydown(function(e) {
            if(e.ctrlKey) {
                let pair = getClockTime(this);
                if(e.code == 'ArrowUp' || e.code == 'ArrowDown') {
                    pair[0] = adjustTime(pair[0], 24, 1, e.code == 'ArrowUp');
                    setClockTime(this, pair);
                    $(this).clockpicker('toggleView', 'hours', 0, false);
                    return false;
                }
                if(e.code == 'ArrowLeft' || e.code == 'ArrowRight') {
                    pair[1] = adjustTime(pair[1], 60, 5, e.code == 'ArrowRight');
                    setClockTime(this, pair);
                    $(this).clockpicker('toggleView', 'minutes', 0, false);
                    return false;
                }
            }
            else if(e.code == 'Enter') {
                $(this).clockpicker('hide');
                return false;
            }
            return true;
        });
    });
</script>
