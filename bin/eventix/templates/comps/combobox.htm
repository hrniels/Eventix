<select id="{{ id }}" name="{{ name }}">
    {% for opt in options %}
        <option
            value="{{ opt.value }}"
            {% if let Some(val) = value %}
                {% if &opt.value == val %}selected="selected"{% endif %}
            {% endif %}
        >
            {{ opt.name|t(locale) }}
        </option>
    {% endfor %}
</select>
<script type="text/javascript">
    $(function () {
        $("#{{ id }}").selectmenu({
            width: "auto",
            position: {
                my: "left top",
                at: "left bottom",
                collision: "flipfit",
            },
        });
    });
</script>
