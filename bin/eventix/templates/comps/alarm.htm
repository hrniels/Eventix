<div id="{{ id }}-tabs">
    <ul>
        <li><a href="#{{ id }}-tabs-CALENDAR">{{ "Calendar"|t(locale) }}</a></li>
        <li><a href="#{{ id }}-tabs-PERSONAL">{{ "Personal"|t(locale) }}</a></li>
    </ul>
    <div id="{{ id }}-tabs-CALENDAR">
        {{ calendar|safe }}
    </div>
    <div id="{{ id }}-tabs-PERSONAL">
        <div style="padding: .4em">
            <input type="checkbox" id="{{ id }}_personal_overwrite"
                                   name="{{ name }}_personal_overwrite"
                                   {% if personal_overwrite %}checked="checked"{% endif %}/>
            <label for="{{ id }}_personal_overwrite">{{ "Overwrite alarm"|t(locale) }}</label>
        </div>
        {{ personal|safe }}
    </div>
</div>

{% if edit %}
<div style="padding-top: .6em; padding-left: .4em">
    <b>{{ "Effective:"|t(locale) }}</b>
    {% if let Some(effective) = effective %}
    {{ effective[0].human(locale.timezone()) }}
    {% else %}
    -
    {% endif %}
</div>
{% endif %}

<style type="text/css">
#{{ id }}-tabs > div {
    padding: 0;
}
</style>
<script>
    $(function() {
        $("#{{ id }}-tabs").tabs();

        $("#{{ id }}_personal_overwrite").click(function() {
            setPersonalOverwrite(this.checked)
        });
        {% if !personal_overwrite %}
        setPersonalOverwrite(false);
        {% endif %}
    });

    function setPersonalOverwrite(overwrite) {
        var ids = ["none", "relative", "absolute", "durunit_", "durtype_", "datetime__time"];
        for(id in ids) {
            $("#{{ id }}_personal__" + ids[id]).prop("disabled", !overwrite);
        }
        $("#{{ id }}_personal__duration").spinner(overwrite ? "enable" : "disable");
        $("#{{ id }}_personal__datetime__date_").datepicker("option", "disabled", !overwrite);
    }
</script>
