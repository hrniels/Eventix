<input type="hidden" id="{{ id }}_trigger" name="{{ name }}[trigger]" value="{{ trigger }}" />
<div id="{{ id }}-tabs">
    <ul>
        <li><a href="#{{ id }}-tabs-NONE">{{ "None"|t(locale) }}</a></li>
        <li><a href="#{{ id }}-tabs-RELATIVE">{{ "Relative"|t(locale) }}</a></li>
        <li><a href="#{{ id }}-tabs-ABSOLUTE">{{ "Absolute"|t(locale) }}</a></li>
    </ul>
    <div id="{{ id }}-tabs-NONE">
    </div>
    <div id="{{ id }}-tabs-RELATIVE">
        <div style="padding: .4em">
            <input id="{{ id }}_duration" name="{{ name }}[duration]" size="5"
                                          value="{{ duration }}" />
            {{ durunit|safe }}
            {{ durtype|safe }}
        </div>
    </div>
    <div id="{{ id }}-tabs-ABSOLUTE">
        <div style="padding: .4em">
            {{ "On:"|t(locale) }} {{ datetime|safe }}
        </div>
    </div>
</div>

<style type="text/css">
#{{ id }}-tabs > div {
    padding: 0;
}
</style>
<script>
    $(function() {
        $("#{{ id }}_duration").spinner({
            min: 1,
        });

        $("#{{ id }}-tabs").tabs({
            activate: function(event, data) {
                var name = data.newPanel.attr('id').replace("{{ id }}-tabs-", "");
                $("#{{ id }}_trigger").attr('value', name);
            }
        });

        var tab = $("#{{ id }}_trigger").attr('value');
        if(tab != 'NONE') {
            var tabs = ['NONE', 'RELATIVE', 'ABSOLUTE'];
            $("#{{ id }}-tabs").tabs("option", "active", tabs.indexOf(tab));
        }
    });
</script>
