<script type="text/javascript">
function calSettings() {
    return {
        dateFormat: "yy-mm-dd",
        changeMonth: true,
        changeYear: true,
        numberOfMonths: 1,
    };
}

$(function() {
    var settings = calSettings();
    $("#{{ id }}")
        .datepicker(settings);
});
</script>

<input id="{{ id }}" type="text" name="{{ name }}" size="8"
       maxlength="10" value="{{ date|naive_date }}" />
