<div id="{{ id }}-attendees">
    {% if attendees.names.is_empty() %}
    -
    {% else %}
    {% for (i, (att, role)) in attendees.names.iter().zip(attendees.roles).enumerate() %}
    <div id="{{ id }}-attendee_{{ i }}" style="padding-bottom: .5em">
        <a href="javascript:toggleRole({{ i }})">
        {% if role == AttendeeRole::Required|as_ref %}
        <i id="{{ id }}_roleicon_{{ i }}" class="bi bi-person-fill"></i>
        {% else %}
        <i id="{{ id }}_roleicon_{{ i }}" class="bi bi-person"></i>
        {% endif %}
        </a>
        <input type="hidden" id="{{ id }}_role_{{ i }}"
               name="{{ name }}[role][{{ i }}]" value="{{ role }}"/>
        <input type="text" size="50" name="{{ name }}[name][{{ i }}]" value="{{ att }}"/>
        <input type="button" value="{{ "Remove"|t(locale) }}"
                             onclick="removeAttendee({{ i }})" />
    </div>
    {% endfor %}
    {% endif %}
</div>
New attendee: <input id="{{ id }}-new-attendee" size="50" />
<input type="button" onclick="addAttendee()" value="{{ "Add"|t(locale) }}" />

<script>
    function toggleRole(id) {
        if($('#{{ id }}_roleicon_' + id).hasClass('bi-person-fill')) {
            $('#{{ id }}_roleicon_' + id).removeClass('bi-person-fill');
            $('#{{ id }}_roleicon_' + id).addClass('bi-person');
            $('#{{ id }}_role_' + id).val('Optional');
        }
        else {
            $('#{{ id }}_roleicon_' + id).removeClass('bi-person');
            $('#{{ id }}_roleicon_' + id).addClass('bi-person-fill');
            $('#{{ id }}_role_' + id).val('Required');
        }
    }

    function addAttendee() {
        var list = $('#{{ id }}-attendees');
        if(list.html().trim() == '-') {
            list.html('');
        }

        var id = 0;
        for(; ; ++id) {
            if(document.getElementById('{{ id }}-attendee_' + id) == null)
                break;
        }

        var attendee = $('#{{ id }}-new-attendee').val();
        list.html(list.html() + '\
            <div id="{{ id }}-attendee_' + id + '" style="padding-bottom: .5em">\
            <a href="javascript:toggleRole(' + id + ')">\
            <i id="{{ id }}_roleicon_' + id + '" class="bi bi-person-fill"></i>\
            </a>\
            <input type="hidden" id="{{ id }}_role_' + id + '"\
                   name="{{ name }}[role][' + id + ']" value="Required"/>\
            <input type="text" size="50" name="{{ name }}[name][' + id + ']"\
                   value="' + attendee + '"/>\
            <input type="button" value="{{ "Remove"|t(locale) }}"\
                   onclick="removeAttendee(' + id + ')" />\
            </div>\
        ');
        $('#{{ id }}-new-attendee').val('');
    }

    function removeAttendee(id) {
        $('#{{ id }}-attendee_' + id).remove();

        var list = $('#{{ id }}-attendees');
        if(list.html().trim() == '') {
            list.html('-');
        }
    }

    $(function() {
        $("#{{ id }}-new-attendee").autocomplete({
            source: "/attendees",
            minLength: 2,
            select: function(event, ui) {
                console.log("Selected: " + ui.item.value + " aka " + ui.item.id);
            }
        });
        $('#{{ id }}-new-attendee').keyup(function(e) {
            if(e.keyCode == 13) {
                addAttendee();
            }
        });
    });
</script>
