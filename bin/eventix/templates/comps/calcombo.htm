<select name="{{ name }}" id="{{ id }}">
    {% for cal in calendars.0 %}
    <option value="{{ cal.id }}"{% if calendar == cal.id %} selected="selected"{% endif %}
            data-style="float: left; margin-right: .5em" data-class="{{ cal.id }}">{{ cal.name }}</option>
    {% endfor %}
</select>

<script>
    $(function() {
        $.widget( "custom.iconselectmenu", $.ui.selectmenu, {
            _renderButtonItem: function(item) {
                var buttonItem = $("<span>", {
                    "class": "ui-selectmenu-text"
                })
                this._setText(buttonItem, item.label);

                var icon = $("<span>", {
                    style: item.element.attr("data-style"),
                    "class": "ev_cal_src ev_cal_src_" + item.element.attr("data-class")
                });
                icon.appendTo(buttonItem);

                return buttonItem;
            },

            _renderItem: function(ul, item) {
                var li = $("<li>");
                var wrapper = $("<div>", { text: item.label } );

                if(item.disabled)
                    li.addClass("ui-state-disabled");

                $("<span>", {
                    style: item.element.attr("data-style"),
                    "class": "ev_cal_src ev_cal_src_" + item.element.attr("data-class")
                })
                .appendTo(wrapper);

                return li.append(wrapper).appendTo(ul);
            }
        });

        $("#{{ id }}")
            .iconselectmenu()
            .iconselectmenu("menuWidget")
            .addClass("ui-menu-icons customicons");
    });
</script>

<style>
    .ui-selectmenu-menu .ui-menu.customicons .ui-menu-item-wrapper {
        padding: .5em 0 .5em .5em;
    }
    .ui-selectmenu-menu .ui-menu.customicons .ui-menu-item .ui-icon {
        height: 24px;
        width: 24px;
        top: 0.1em;
    }
</style>
