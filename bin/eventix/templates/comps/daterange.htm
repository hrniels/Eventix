<script type="text/javascript">
function calSettings() {
    return {
        dateFormat: "yy-mm-dd",
        changeMonth: true,
        changeYear: true,
        numberOfMonths: 1,
    };
}

$(function() {
    var settings = calSettings();
    var from = $("#{{ name }}from_date")
        .datepicker(settings)
        .on("change", function() {
            to.datepicker("option", "minDate", getDate(this));
        });
    var to = $("#{{ name }}to_date")
        .datepicker(settings)
        .on("change", function() {
            from.datepicker("option", "maxDate", getDate(this));
        });

    function getDate(element) {
        var date;
        try {
            date = $.datepicker.parseDate(settings.dateFormat, element.value);
        }
        catch(error) {
            date = null;
        }
        return date;
    }
});
</script>

<div style="padding-bottom: .3em">
    <input type="checkbox" id="{{ name }}all_day" name="{{ name }}all_day"
           {% if all_day %}checked="checked"{% endif %} />
    <label for="{{ name }}all_day">{{ "All day"|t(locale) }}</label>
</div>

<table class="ev_date">
    <tr>
        <td style="width: 3em">
            {{ "Start"|t(locale) }}:
        </td>
        <td>
            <input id="{{ name }}from_date" type="text" name="{{ name }}[from_date]" size="8"
                   maxlength="10" value="{{ from_date|naive_date }}" />
            <input id="{{ name }}from_time" type="text" name="{{ name }}[from_time]" size="8"
                   maxlength="5" value="{{ from_time|naive_time }}" />
        </td>
    </tr>
    <tr>
        <td>
            {{ "End"|t(locale) }}:
        </td>
        <td>
            <input id="{{ name }}to_date" type="text" name="{{ name }}[to_date]" size="8"
                   maxlength="10" value="{{ to_date|naive_date }}" />
            <input id="{{ name }}to_time" type="text" name="{{ name }}[to_time]" size="8"
                   maxlength="5" value="{{ to_time|naive_time }}" />
        </td>
    </tr>
</table>

<script type="text/javascript">
$(function() {
    {% if all_day %}
    setAllDay(true);
    {% endif %}

    $("#{{ name }}all_day").click(function() {
        setAllDay(this.checked)
    });
});

function setAllDay(allday) {
    if(allday) {
        $("#{{ name }}from_time").prop("disabled", true);
        $("#{{ name }}to_time").prop("disabled", true);
    }
    else {
        $("#{{ name }}from_time").prop("disabled", false);
        $("#{{ name }}to_time").prop("disabled", false);
    }
}
</script>
