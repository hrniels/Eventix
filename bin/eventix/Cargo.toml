[package]
name = "eventix"
version = "0.1.0"
edition = "2024"
build = "../build.rs"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
bitflags.workspace = true
chrono-tz.workspace = true
chrono.workspace = true
clap.workspace = true
eventix-cmd.workspace = true
eventix-state.workspace = true
eventix-locale.workspace = true
eventix-ical.workspace = true
formatx.workspace = true
itertools.workspace = true
once_cell.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
toml.workspace = true
tracing.workspace = true
xdg.workspace = true

askama = "0.15.6"
axum = { version = "0.8.9", features = ["macros", "multipart"] }
email_address = "0.2.9"
futures = "0.3.32"
numfmt = "1.2.0"
regex = "1.12.3"
serde_qs = "1.1.1"
serde_urlencoded = "0.7.1"
strum = { version = "0.28.0", features = ["derive"] }
tower = "0.5.3"
tower-http = { version = "0.6.8", features = ["fs", "trace", "set-header"] }
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
uuid = { version = "1.23.1", features = ["v4"] }

[dev-dependencies]
criterion = { version = "0.8.2", features = ["async_tokio"] }
iana-time-zone = "0.1.65"
tempfile.workspace = true
tower = { version = "0.5.3", features = ["util"] }

[[bench]]
name = "list"
harness = false

[[bench]]
name = "monthly"
harness = false

[[bench]]
name = "weekly"
harness = false

[[bench]]
name = "parse"
harness = false

[[test]]
name = "api_items"
path = "tests/api/items.rs"

[[test]]
name = "api_calendars"
path = "tests/api/calendars.rs"

[[test]]
name = "api_collections"
path = "tests/api/collections.rs"

[[test]]
name = "api_misc"
path = "tests/api/misc.rs"

[[test]]
name = "pages_collections_add"
path = "tests/pages/collections/add.rs"

[[test]]
name = "pages_collections_edit"
path = "tests/pages/collections/edit.rs"

[build-dependencies]
askama = "0.15.6"
