[package]
name = "eventix"
version = "0.1.0"
edition = "2024"
build = "../build.rs"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
bitflags.workspace = true
chrono-tz.workspace = true
chrono.workspace = true
clap.workspace = true
eventix-cmd.workspace = true
eventix-state.workspace = true
eventix-locale.workspace = true
eventix-ical.workspace = true
itertools.workspace = true
once_cell.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
toml.workspace = true
tracing.workspace = true
xdg.workspace = true

askama = "0.14.0"
axum = { version = "0.8.7", features = ["macros", "multipart"] }
formatx = "0.2.4"
futures = "0.3.31"
numfmt = "1.2.0"
regex = "1.12.2"
serde_qs = "0.15.0"
serde_urlencoded = "0.7.1"
strum = { version = "0.27.2", features = ["derive"] }
tower = "0.5.2"
tower-http = { version = "0.6.7", features = ["fs", "trace", "set-header"] }
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
uuid = { version = "1.18.1", features = ["v4"] }

[build-dependencies]
askama = "0.14.0"
