[package]
name = "eventix"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.98"
askama = "0.14.0"
async-trait = "0.1.88"
axum = { version = "0.8.4", features = ["macros", "multipart"] }
bitflags = "2.9.1"
chrono = { version = "0.4.41", features = ["serde"] }
chrono-tz = "0.10.4"
clap = { version = "4.5.41", features = ["derive"] }
formatx = "0.2.4"
ical = { path = "../../ical" }
itertools = "0.14.0"
numfmt = "1.1.1"
once_cell = "1.21.3"
regex = "1.11.1"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
serde_qs = "0.15.0"
strum = { version = "0.27.1", features = ["derive"] }
tokio = { version = "1.46.1", features = ["full"] }
toml = "0.9.2"
tower = "0.5.2"
tower-http = { version = "0.6.6", features = ["fs", "trace", "set-header"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
uuid = { version = "1.17.0", features = ["v4"] }

[build-dependencies]
askama = "0.12.1"
