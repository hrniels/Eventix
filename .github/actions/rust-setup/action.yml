name: Rust setup
description: >
  Checks out the repository, optionally installs GTK system dependencies,
  installs the stable Rust toolchain, and restores the Cargo cache.

inputs:
  components:
    description: Extra rustup components to install (comma-separated)
    required: false
    default: ""
  gtk:
    description: Install GTK / WebKit2GTK system dependencies
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install GTK / WebKit2GTK system dependencies
      if: inputs.gtk == 'true'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libgdk-pixbuf2.0-dev \
          elfutils \
          librsvg2-common

    - name: Install Rust (stable)
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}

    - name: Cache Cargo registry and build artifacts
      uses: Swatinem/rust-cache@v2
