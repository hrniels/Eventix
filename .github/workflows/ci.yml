name: CI

on:
  pull_request: {}
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'staging'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --------------------------------------------------------------------------
  # Prettier formatting check (JS, CSS, HTML templates)
  # --------------------------------------------------------------------------
  prettier:
    name: Prettier
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: ./b format-check

  # --------------------------------------------------------------------------
  # Formatting check
  # --------------------------------------------------------------------------
  fmt:
    name: Format
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  # --------------------------------------------------------------------------
  # Clippy lint
  # --------------------------------------------------------------------------
  clippy:
    name: Clippy
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          gtk: "true"

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # --------------------------------------------------------------------------
  # Tests
  # --------------------------------------------------------------------------
  test:
    name: Test
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          gtk: "true"

      - name: Install test system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            radicale \
            ant \
            maven

      - name: Build bundled test tools
        run: |
          ./b vdirsyncer
          ./b davmail

      - name: Run tests
        run: ./b test --all-features

  # --------------------------------------------------------------------------
  # Code coverage (runs only after tests pass)
  # --------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          components: llvm-tools-preview
          gtk: "true"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Exclude the GTK-dependent binaries — they cannot run headlessly and
      # their coverage is not meaningful in a CI environment.
      - name: Collect coverage
        run: |
          cargo llvm-cov \
            --all-features \
            --workspace \
            --exclude eventix-import \
            --exclude eventix-app \
            --exclude evlist \
            --lcov \
            --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true
