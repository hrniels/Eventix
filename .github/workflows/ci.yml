name: CI

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --------------------------------------------------------------------------
  # Formatting check
  # --------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  # --------------------------------------------------------------------------
  # Clippy lint
  # --------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
          gtk: "true"

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # --------------------------------------------------------------------------
  # Tests
  # --------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          gtk: "true"

      - name: Run tests
        run: cargo test --all-features

  # --------------------------------------------------------------------------
  # Code coverage (runs only after tests pass)
  # --------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/rust-setup
        with:
          components: llvm-tools-preview
          gtk: "true"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Exclude the GTK-dependent binaries — they cannot run headlessly and
      # their coverage is not meaningful in a CI environment.
      - name: Collect coverage
        run: |
          cargo llvm-cov \
            --all-features \
            --workspace \
            --exclude eventix \
            --exclude eventix-import \
            --exclude eventix-app \
            --exclude evlist \
            --lcov \
            --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true

  # --------------------------------------------------------------------------
  # Flatpak bundle (runs only after tests pass)
  # --------------------------------------------------------------------------
  flatpak:
    name: Flatpak
    runs-on: ubuntu-latest
    needs: [test, fmt, clippy]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            flatpak \
            flatpak-builder \
            python3 \
            elfutils \
            librsvg2-common

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak bundle
        run: ./b flatpak

      - name: Upload Flatpak bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Eventix-flatpak
          path: flatpak/Eventix.flatpak
          retention-days: 30
